<main>

<section class="hero">
<h2>Contact Us</h2>
<p>
Have questions or suggestions? Fill out the form below.
</p>
</section>

<section class="form-section">

<form method="post" action="https://webdevbasics.net/scripts/demo.php" onsubmit="return validateForm();">

<label for="name">Name:</label>
<input type="text" id="name" name="name" required>

<label for="email">Email:</label>
<input type="email" id="email" name="email" required>

<label for="type">Reason for Contact:</label>
<select id="type" name="type">
<option value="question">Question</option>
<option value="feedback">Feedback</option>
<option value="support">Support</option>
</select>

<label for="message">Message:</label>
<textarea id="message" name="message" rows="5" required></textarea>

<button type="submit">Submit</button>

</form>

</section>

</main>

<footer>
<p>
Student Project – Not an official University of West Georgia website.
</p>
</footer>

<script>
function validateForm() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;

  if (name === "" || email === "" || message === "") {
    alert("Please complete all required fields before submitting the form.");
    return false;
  }

  alert("Thank you! Your message has been submitted.");
  return true;
}
</script>
